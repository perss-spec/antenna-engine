<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Map — PROMIN Antenna Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0f;
  font-family: 'Inter', -apple-system, sans-serif;
  color: #e0e0e0;
  overflow: hidden;
  height: 100vh;
}

/* ── Nav ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: rgba(18, 18, 26, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid #1e1e2e;
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 100;
  gap: 32px;
}

nav .logo-link {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
}

nav a {
  color: #666;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: color 0.2s;
}
nav a:hover { color: #e0e0e0; }
nav a.active {
  color: #e0e0e0;
  position: relative;
}
nav a.active::after {
  content: '';
  position: absolute;
  bottom: -17px;
  left: 0; right: 0;
  height: 2px;
  background: #6366f1;
  border-radius: 1px;
}

nav .spacer { flex: 1; }

nav .status-badge {
  font-size: 11px;
  color: #4ade80;
  display: flex;
  align-items: center;
  gap: 6px;
}
nav .status-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: #4ade80;
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

/* ── Canvas ── */
#mapCanvas {
  position: fixed;
  top: 56px; left: 0;
  width: 100%;
  height: calc(100vh - 56px);
}

/* ── Tooltip ── */
#tooltip {
  position: fixed;
  pointer-events: none;
  background: rgba(18, 18, 26, 0.96);
  backdrop-filter: blur(20px);
  border: 1px solid #2a2a3e;
  border-radius: 12px;
  padding: 16px 20px;
  z-index: 200;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  min-width: 260px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(99,102,241,0.08);
}
#tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}
#tooltip h3 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
#tooltip .tt-row {
  font-size: 12px;
  color: #888;
  margin-bottom: 5px;
  display: flex;
  gap: 8px;
}
#tooltip .tt-row .label {
  color: #555;
  min-width: 60px;
}
#tooltip .tt-row .value {
  color: #b0b0c0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
#tooltip .tt-status {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #1e1e2e;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
#tooltip .tt-status .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

/* ── Legend ── */
.legend {
  position: fixed;
  bottom: 20px;
  left: 24px;
  display: flex;
  gap: 16px;
  z-index: 50;
  font-size: 11px;
  color: #555;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

/* ── Minimap indicator ── */
.pipeline-info {
  position: fixed;
  bottom: 20px;
  right: 24px;
  font-size: 11px;
  color: #444;
  z-index: 50;
  text-align: right;
  line-height: 1.6;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo-link">PROMIN</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="map.html" class="active">Map</a>
  <span class="spacer"></span>
  <span class="status-badge">Pipeline Ready</span>
</nav>

<canvas id="mapCanvas"></canvas>

<div id="tooltip">
  <h3 id="tt-title"></h3>
  <div class="tt-row"><span class="label">Model</span><span class="value" id="tt-model"></span></div>
  <div class="tt-row"><span class="label">Endpoint</span><span class="value" id="tt-endpoint"></span></div>
  <div class="tt-row"><span class="label">Scope</span><span class="value" id="tt-scope"></span></div>
  <div class="tt-status">
    <div class="dot" id="tt-dot"></div>
    <span id="tt-status-text"></span>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Success</div>
  <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div> Running</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div> Error</div>
  <div class="legend-item"><div class="legend-dot" style="background:#555"></div> Idle</div>
</div>

<div class="pipeline-info">
  11 Workflows · 5 Parallel Agents<br>
  N8N Orchestration · PROMIN v0.1
</div>

<script>
// ── Setup ──
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
let W, H, dpr;
let mouseX = -1000, mouseY = -1000;
let hoveredNode = null;
let selectedNode = null;
let time = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight - 56;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutNodes();
}

// ── Node Data ──
const nodes = [
  { id: 'trigger',   name: 'Trigger',    icon: '⚡', model: 'Webhook',              endpoint: 'POST /ae/start',       scope: '—',                    status: 'success', lastRun: '2m ago' },
  { id: 'pm',        name: 'PM',         icon: '📋', model: 'Claude Opus 4',        endpoint: 'POST /ae/pm',          scope: 'Task decomposition',   status: 'success', lastRun: '2m ago' },
  { id: 'architect', name: 'Architect',  icon: '🏗️', model: 'Claude Opus 4',        endpoint: 'POST /ae/architect',   scope: 'Architecture plans',   status: 'success', lastRun: '1m ago' },
  { id: 'dispatch',  name: 'Dispatch',   icon: '🔀', model: 'JavaScript (N8N)',     endpoint: 'POST /ae/dispatch',    scope: 'Route to teams',       status: 'success', lastRun: '1m ago' },
  { id: 'core',      name: 'Core',       icon: '⚙️', model: 'Claude Opus 4',        endpoint: 'POST /ae/team/core',   scope: 'src-tauri/src/core/',   status: 'running', lastRun: 'now' },
  { id: 'ui',        name: 'UI',         icon: '🎨', model: 'v0-1.5-lg / Sonnet 4', endpoint: 'POST /ae/team/ui',    scope: 'src/components/',       status: 'running', lastRun: 'now' },
  { id: '3d',        name: '3D',         icon: '🔮', model: 'Claude Sonnet 4',      endpoint: 'POST /ae/team/3d',     scope: 'src/viewport/',         status: 'running', lastRun: 'now' },
  { id: 'gpu',       name: 'GPU',        icon: '🔥', model: 'DeepSeek V3',          endpoint: 'POST /ae/team/gpu',    scope: 'src-tauri/src/gpu/',    status: 'idle',    lastRun: '5m ago' },
  { id: 'aiml',      name: 'AI/ML',      icon: '🧠', model: 'Gemini 2.5 Pro',       endpoint: 'POST /ae/team/aiml',   scope: 'python/',               status: 'running', lastRun: 'now' },
  { id: 'review',    name: 'Review',     icon: '🔍', model: 'Sonnet + DeepSeek',    endpoint: 'POST /ae/review',      scope: 'Quality gates',         status: 'idle',    lastRun: '8m ago' },
  { id: 'integrate', name: 'Integrate',  icon: '🚀', model: 'Claude Sonnet 4',      endpoint: 'POST /ae/integrate',   scope: 'Git integration',       status: 'idle',    lastRun: '10m ago' },
];

const connections = [
  { from: 'trigger',   to: 'pm' },
  { from: 'pm',        to: 'architect' },
  { from: 'architect', to: 'dispatch' },
  { from: 'dispatch',  to: 'core' },
  { from: 'dispatch',  to: 'ui' },
  { from: 'dispatch',  to: '3d' },
  { from: 'dispatch',  to: 'gpu' },
  { from: 'dispatch',  to: 'aiml' },
  { from: 'core',      to: 'review' },
  { from: 'ui',        to: 'review' },
  { from: '3d',        to: 'review' },
  { from: 'gpu',       to: 'review' },
  { from: 'aiml',      to: 'review' },
  { from: 'review',    to: 'integrate' },
];

const statusColors = {
  success: '#4ade80',
  running: '#facc15',
  error:   '#f87171',
  idle:    '#555555',
};

const nodeMap = {};
nodes.forEach(n => { nodeMap[n.id] = n; });

// ── Layout ──
const NODE_W = 140;
const NODE_H = 72;
const NODE_R = 14;

function layoutNodes() {
  const cx = W / 2;
  const cy = H / 2;
  const hGap = 180;
  const vGap = 110;

  // Row 0: Trigger → PM → Architect → Dispatch (top row)
  const row0Y = cy - vGap * 2;
  const row0 = ['trigger', 'pm', 'architect', 'dispatch'];
  const row0Start = cx - (row0.length - 1) * hGap / 2;
  row0.forEach((id, i) => {
    nodeMap[id].x = row0Start + i * hGap;
    nodeMap[id].y = row0Y;
  });

  // Row 1: Core, UI, 3D spread + GPU, AIML offset
  const row1Y = cy - vGap * 0.4;
  const teamIds = ['gpu', 'core', 'ui', '3d', 'aiml'];
  const teamSpread = hGap * 1.05;
  const teamStart = cx - (teamIds.length - 1) * teamSpread / 2;
  teamIds.forEach((id, i) => {
    nodeMap[id].x = teamStart + i * teamSpread;
    nodeMap[id].y = row1Y;
  });

  // Row 2: Review
  const row2Y = cy + vGap * 1.1;
  nodeMap['review'].x = cx;
  nodeMap['review'].y = row2Y;

  // Row 3: Integrate
  const row3Y = cy + vGap * 2.2;
  nodeMap['integrate'].x = cx;
  nodeMap['integrate'].y = row3Y;
}

// ── Background Grid ──
function drawGrid() {
  const gridSize = 40;
  ctx.strokeStyle = 'rgba(99,102,241,0.03)';
  ctx.lineWidth = 1;
  for (let x = gridSize; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = gridSize; y < H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

// ── Background Particles ──
const bgParticles = [];
for (let i = 0; i < 60; i++) {
  bgParticles.push({
    x: Math.random() * 2000,
    y: Math.random() * 1200,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    r: Math.random() * 1.5 + 0.5,
    alpha: Math.random() * 0.15 + 0.03,
  });
}

function drawBgParticles() {
  bgParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(99,102,241,${p.alpha})`;
    ctx.fill();
  });
}

// ── Connection Drawing ──
function getNodeCenter(node) {
  return { x: node.x, y: node.y };
}

function getConnectionPoints(fromNode, toNode) {
  const from = getNodeCenter(fromNode);
  const to = getNodeCenter(toNode);

  // Exit from bottom of 'from', enter from top of 'to'
  let fx = from.x, fy = from.y + NODE_H / 2;
  let tx = to.x, ty = to.y - NODE_H / 2;

  // For horizontal connections (same row)
  if (Math.abs(from.y - to.y) < 20) {
    if (from.x < to.x) {
      fx = from.x + NODE_W / 2; fy = from.y;
      tx = to.x - NODE_W / 2; ty = to.y;
    } else {
      fx = from.x - NODE_W / 2; fy = from.y;
      tx = to.x + NODE_W / 2; ty = to.y;
    }
  }

  return { fx, fy, tx, ty };
}

function drawConnections() {
  connections.forEach(conn => {
    const fromNode = nodeMap[conn.from];
    const toNode = nodeMap[conn.to];
    const { fx, fy, tx, ty } = getConnectionPoints(fromNode, toNode);

    const isHighlighted = selectedNode &&
      (selectedNode.id === conn.from || selectedNode.id === conn.to);
    const isHoverHighlighted = hoveredNode &&
      (hoveredNode.id === conn.from || hoveredNode.id === conn.to);

    const baseAlpha = isHighlighted ? 0.6 : isHoverHighlighted ? 0.4 : 0.12;
    const lineWidth = isHighlighted ? 2.5 : isHoverHighlighted ? 2 : 1.2;

    // Determine connection color from status
    const fromStatus = fromNode.status;
    const toStatus = toNode.status;
    let color = statusColors.idle;
    if (fromStatus === 'success' && (toStatus === 'success' || toStatus === 'running')) {
      color = statusColors.success;
    } else if (fromStatus === 'running' || toStatus === 'running') {
      color = statusColors.running;
    } else if (fromStatus === 'error' || toStatus === 'error') {
      color = statusColors.error;
    }

    // Draw curved line
    const midY = (fy + ty) / 2;
    ctx.beginPath();
    ctx.moveTo(fx, fy);

    if (Math.abs(fy - ty) < 20) {
      // Horizontal: simple curve
      const midX = (fx + tx) / 2;
      ctx.quadraticCurveTo(midX, fy - 20, tx, ty);
    } else {
      ctx.bezierCurveTo(fx, midY, tx, midY, tx, ty);
    }

    ctx.strokeStyle = hexToRgba(color, baseAlpha);
    ctx.lineWidth = lineWidth;
    ctx.stroke();

    // Flowing particles along connection
    const numDots = isHighlighted ? 4 : 2;
    for (let i = 0; i < numDots; i++) {
      const speed = 0.0006;
      const offset = i / numDots;
      let t = ((time * speed + offset + conn.from.length * 0.1) % 1);

      // Compute point on bezier
      const px = bezierPoint(fx, fx, tx, tx, t);
      const py = bezierPoint(fy, midY, midY, ty, t);

      const dotAlpha = isHighlighted ? 0.9 : isHoverHighlighted ? 0.7 : 0.3;
      const dotR = isHighlighted ? 3 : 2;

      ctx.beginPath();
      ctx.arc(px, py, dotR, 0, Math.PI * 2);
      ctx.fillStyle = hexToRgba(color, dotAlpha);
      ctx.fill();

      // Glow
      if (isHighlighted || isHoverHighlighted) {
        ctx.beginPath();
        ctx.arc(px, py, dotR * 3, 0, Math.PI * 2);
        const g = ctx.createRadialGradient(px, py, 0, px, py, dotR * 3);
        g.addColorStop(0, hexToRgba(color, 0.3));
        g.addColorStop(1, hexToRgba(color, 0));
        ctx.fillStyle = g;
        ctx.fill();
      }
    }
  });
}

function bezierPoint(p0, p1, p2, p3, t) {
  const mt = 1 - t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}

// ── Node Drawing ──
function drawNode(node) {
  const x = node.x - NODE_W / 2;
  const y = node.y - NODE_H / 2;
  const isHovered = hoveredNode === node;
  const isSelected = selectedNode === node;
  const isActive = node.status === 'running';

  // Glow
  if (isHovered || isSelected || isActive) {
    const glowColor = isSelected ? '#6366f1' : isHovered ? '#6366f1' : statusColors[node.status];
    const glowR = isSelected ? 40 : isHovered ? 30 : 20 + Math.sin(time * 0.003) * 8;
    const glowAlpha = isSelected ? 0.15 : isHovered ? 0.1 : 0.06 + Math.sin(time * 0.003) * 0.03;
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = glowR;

    // Extra outer glow for active
    if (isActive) {
      ctx.beginPath();
      roundRect(ctx, x - 4, y - 4, NODE_W + 8, NODE_H + 8, NODE_R + 2);
      const pulseAlpha = 0.04 + Math.sin(time * 0.004) * 0.03;
      ctx.fillStyle = hexToRgba(statusColors.running, pulseAlpha);
      ctx.fill();
    }
  }

  // Background
  ctx.beginPath();
  roundRect(ctx, x, y, NODE_W, NODE_H, NODE_R);
  const bgColor = isSelected ? 'rgba(99,102,241,0.12)' :
                  isHovered ? 'rgba(30,30,50,0.95)' : 'rgba(18,18,26,0.9)';
  ctx.fillStyle = bgColor;
  ctx.fill();

  // Border
  ctx.beginPath();
  roundRect(ctx, x, y, NODE_W, NODE_H, NODE_R);
  const borderAlpha = isSelected ? 0.6 : isHovered ? 0.4 : 0.15;
  const borderColor = isSelected ? '#6366f1' : isHovered ? '#6366f1' : '#1e1e2e';
  ctx.strokeStyle = isSelected || isHovered ? hexToRgba(borderColor, borderAlpha) : borderColor;
  ctx.lineWidth = isSelected ? 2 : 1;
  ctx.stroke();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // Status dot
  const dotX = x + 14;
  const dotY = y + 14;
  const dotR = 4;
  const sColor = statusColors[node.status];

  if (isActive) {
    // Pulsing ring for running
    const ringR = dotR + 3 + Math.sin(time * 0.005) * 2;
    ctx.beginPath();
    ctx.arc(dotX, dotY, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = hexToRgba(sColor, 0.3);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
  ctx.fillStyle = sColor;
  ctx.fill();

  // Icon
  ctx.font = '18px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(node.icon, x + NODE_W / 2, y + 22);

  // Name
  ctx.font = '600 13px Inter, sans-serif';
  ctx.fillStyle = isHovered || isSelected ? '#ffffff' : '#e0e0e0';
  ctx.fillText(node.name, x + NODE_W / 2, y + 45);

  // Model (small)
  ctx.font = '400 9px Inter, sans-serif';
  ctx.fillStyle = '#555';
  const modelShort = node.model.length > 18 ? node.model.substring(0, 18) + '…' : node.model;
  ctx.fillText(modelShort, x + NODE_W / 2, y + 60);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function hexToRgba(hex, alpha) {
  if (hex.startsWith('rgba') || hex.startsWith('rgb')) return hex;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Hit Testing ──
function hitTest(mx, my) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const x = n.x - NODE_W / 2;
    const y = n.y - NODE_H / 2;
    if (mx >= x && mx <= x + NODE_W && my >= y && my <= y + NODE_H) {
      return n;
    }
  }
  return null;
}

// ── Tooltip ──
function showTooltip(node, mx, my) {
  document.getElementById('tt-title').textContent = node.icon + '  ' + node.name;
  document.getElementById('tt-model').textContent = node.model;
  document.getElementById('tt-endpoint').textContent = node.endpoint;
  document.getElementById('tt-scope').textContent = node.scope;
  document.getElementById('tt-dot').style.background = statusColors[node.status];
  document.getElementById('tt-status-text').textContent =
    node.status.charAt(0).toUpperCase() + node.status.slice(1) + ' · ' + node.lastRun;

  // Position
  let tx = mx + 16;
  let ty = my + 16;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  if (tx + tw > W - 20) tx = mx - tw - 16;
  if (ty + th > H - 20) ty = my - th - 16;

  tooltip.style.left = tx + 'px';
  tooltip.style.top = (ty + 56) + 'px';
  tooltip.classList.add('visible');
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ── Title & Decorations ──
function drawTitle() {
  // Faint title
  ctx.save();
  ctx.font = '700 11px Inter, sans-serif';
  ctx.fillStyle = 'rgba(99,102,241,0.15)';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('PROMIN ANTENNA STUDIO — PIPELINE ARCHITECTURE', 24, 20);

  // Stage labels
  ctx.font = '600 10px Inter, sans-serif';
  ctx.fillStyle = 'rgba(99,102,241,0.08)';
  ctx.textAlign = 'center';

  const cx = W / 2;
  const topY = nodeMap.trigger.y - NODE_H / 2 - 20;
  ctx.fillText('ORCHESTRATION', cx, topY);

  const midY = nodeMap.core.y - NODE_H / 2 - 20;
  ctx.fillText('PARALLEL EXECUTION', cx, midY);

  const botY = nodeMap.review.y - NODE_H / 2 - 20;
  ctx.fillText('QUALITY & INTEGRATION', cx, botY);

  ctx.restore();
}

// ── Vignette ──
function drawVignette() {
  const grd = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.9);
  grd.addColorStop(0, 'rgba(10,10,15,0)');
  grd.addColorStop(1, 'rgba(10,10,15,0.7)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

// ── Main Loop ──
function render() {
  time++;
  ctx.clearRect(0, 0, W, H);

  drawGrid();
  drawBgParticles();
  drawTitle();
  drawConnections();
  nodes.forEach(n => drawNode(n));
  drawVignette();

  requestAnimationFrame(render);
}

// ── Events ──
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;

  const hit = hitTest(mouseX, mouseY);
  if (hit !== hoveredNode) {
    hoveredNode = hit;
    canvas.style.cursor = hit ? 'pointer' : 'default';
    if (hit) {
      showTooltip(hit, mouseX, mouseY);
    } else {
      hideTooltip();
    }
  } else if (hit) {
    showTooltip(hit, mouseX, mouseY);
  }
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = hitTest(mx, my);

  if (hit) {
    selectedNode = (selectedNode === hit) ? null : hit;
  } else {
    selectedNode = null;
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  hideTooltip();
  canvas.style.cursor = 'default';
});

window.addEventListener('resize', resize);

// ── Live Status Polling ──
const teamIdMap = { core: 'core', ui: 'ui', '3d': '3d', gpu: 'gpu', aiml: 'aiml' };

async function fetchStatus() {
  try {
    const n8nBase = location.hostname === 'localhost' ? 'http://localhost:5678' : 'https://girls-letting-essays-days.trycloudflare.com';
    const resp = await fetch(n8nBase + '/webhook/ae/status');
    if (!resp.ok) return;
    const data = await resp.json();

    const badge = document.querySelector('.status-badge');
    if (badge) badge.textContent = data.status === 'running' ? 'Pipeline Running' : 'Pipeline ' + data.status;

    if (data.teams) {
      Object.entries(data.teams).forEach(([key, info]) => {
        const nodeId = teamIdMap[key] || key;
        const node = nodeMap[nodeId];
        if (!node) return;
        const st = info.status === 'completed' ? 'success' : info.status === 'error' ? 'error' : info.status === 'running' ? 'running' : 'idle';
        node.status = st;
        node.lastRun = st === 'running' ? 'now' : st === 'success' ? 'done' : st === 'error' ? 'failed' : node.lastRun;
      });
    }

    // Mark dispatch/review/integrate based on phase
    if (data.current_phase === 'teams') {
      nodeMap.dispatch.status = 'running';
      nodeMap.dispatch.lastRun = 'now';
    } else if (data.current_phase === 'review') {
      nodeMap.dispatch.status = 'success';
      nodeMap.review.status = 'running';
    } else if (data.current_phase === 'integrate') {
      nodeMap.review.status = 'success';
      nodeMap.integrate.status = 'running';
    }
  } catch (e) { /* silently ignore */ }
}

fetchStatus();
setInterval(fetchStatus, 3000);

// ── Init ──
resize();
render();
</script>
